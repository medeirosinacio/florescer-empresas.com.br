# General
title: Florescer Desenvolvimento Humano
email: contato@florescer-empresas.com.br
source: .
destination: ./public
baseurl: "/florescer-empresas.com.br"
url: https://medeirosinacio.github.io
srcurl: "/florescer-empresas.com.br"
lang: pt-BR
locale: pt_BR
author: Florescer Desenvolvimento Humano
description: "Transformando relações de trabalho através do cuidado com o humano. Psicólogas especializadas em desenvolvimento humano organizacional."
google_analytics: ""
published: true

# Staticforms form contact email
staticforms_api_key: b805ad43-5c0a-42f4-bcb7-f08c89da57b3

# Paginator configuration
paginate: 3
paginate_path: "/blog/pagina/:num"

# Social Media
social:
  name: Florescer Desenvolvimento Humano
  links:
    - https://www.instagram.com/florescer.dh/
    - https://www.linkedin.com/company/florescer-dh/

# Site Paths
post_path: /assets/images/posts/
icon_path: /assets/icons/
image_path: /assets/images/
css_path: /assets/css/
js_path: /assets/scripts/

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
exclude:
  - .github
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - tailwindcss
  - assets/css/input.css
  - .idea
  - LICENSE
