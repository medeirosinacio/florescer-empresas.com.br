    descricao: >-
      Traz a profundidade da escuta clínica para o universo das organizações. Foco em
      saúde mental, vínculos relacionais e construção de culturas corporativas mais conscientes.
    cor: blush
    instagram_key: instagram_isis
    crp_key: crp_isis

