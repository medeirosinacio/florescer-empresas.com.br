nome: Florescer Desenvolvimento Humano
tagline: Psicologia organizacional para empresas que colocam pessoas no centro.
localizacao: Grande Porto Alegre e Região

fundadoras:
  - nome: Fernanda Stroff
    titulo: Psicóloga Clínica e Organizacional
    foto: foto-04.jpg
    descricao: >-
      Atua no campo do desenvolvimento humano e das relações de trabalho, articulando escuta clínica
      e visão estratégica na construção de ambientes organizacionais mais saudáveis e funcionais.
    cor: sage      # cor do badge e hover
    instagram_key: instagram_fernanda   # chave no _config.yml
    crp_key: crp_fernanda               # chave no _config.yml

  - nome: Isis Couto
    titulo: Psicóloga Clínica e Organizacional
    foto: foto-07.jpg
