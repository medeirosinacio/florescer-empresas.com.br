diferenciais:
  - titulo: Integração técnica + olhar humano
    descricao: Unimos conhecimento clínico em psicologia com sensibilidade para a cultura de cada organização.

  - titulo: Experiência clínica aplicada ao corporativo
    descricao: A formação em clínica enriquece cada intervenção organizacional com profundidade e rigor.

  - titulo: Abordagem ética, sensível e estratégica
    descricao: Respeitamos a complexidade humana e os objetivos do negócio, sem abrir mão da ética.

  - titulo: Foco em mudanças culturais duradouras
    descricao: "Não trabalhamos para \"treinar pessoas\". Trabalhamos para transformar relações de trabalho."

citacao: "Produtividade sem saúde não se sustenta. Desenvolvimento sem escuta não acontece."
